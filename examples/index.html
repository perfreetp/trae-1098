<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>智慧停车SDK - 演示</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      padding: 20px;
    }
    .header {
      text-align: center;
      margin-bottom: 30px;
    }
    .header h1 {
      color: #262626;
      margin-bottom: 10px;
    }
    .header p {
      color: #8c8c8c;
    }
    .controls {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }
    .controls button {
      padding: 8px 16px;
      border: 1px solid #d9d9d9;
      background: white;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
    }
    .controls button:hover {
      border-color: #1890ff;
      color: #1890ff;
    }
    .demo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
      gap: 24px;
      max-width: 1400px;
      margin: 0 auto;
    }
    .demo-card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .demo-card h3 {
      color: #262626;
      margin-bottom: 16px;
      font-size: 16px;
      border-bottom: 1px solid #f0f0f0;
      padding-bottom: 12px;
    }
    .component-container {
      min-height: 100px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🚗 智慧停车 SDK 演示</h1>
    <p>7大组件 · 16项核心能力 · 快速接入停车服务</p>
  </div>

  <div class="controls">
    <button onclick="sdk.setTheme('light')">☀️ 浅色主题</button>
    <button onclick="sdk.setTheme('dark')">🌙 深色主题</button>
    <button onclick="sdk.setLanguage('zh-CN')">🇨🇳 中文</button>
    <button onclick="sdk.setLanguage('en-US')">🇺🇸 English</button>
    <button onclick="sdk.showToast('这是一条成功提示', 'success')">✅ Toast</button>
    <button onclick="sdk.showError('TEST001', '这是一个错误示例')">❌ Error</button>
  </div>

  <div class="demo-grid">
    <div class="demo-card">
      <h3>📍 车场选择器</h3>
      <div id="lot-selector" class="component-container"></div>
    </div>

    <div class="demo-card">
      <h3>🅿️ 余位面板</h3>
      <div id="space-panel" class="component-container"></div>
    </div>

    <div class="demo-card">
      <h3>🚙 车牌输入</h3>
      <div id="plate-input" class="component-container"></div>
    </div>

    <div class="demo-card">
      <h3>📋 停车订单卡片</h3>
      <div id="order-card" class="component-container"></div>
    </div>

    <div class="demo-card">
      <h3>🎫 优惠券组件</h3>
      <div id="coupon-list" class="component-container"></div>
    </div>

    <div class="demo-card">
      <h3>💰 支付结果页</h3>
      <div id="payment-result" class="component-container"></div>
    </div>

    <div class="demo-card">
      <h3>🧾 发票申请页</h3>
      <div id="invoice-apply" class="component-container"></div>
    </div>
  </div>

  <script type="module">
    import sdk from '../src/index.ts';

    window.sdk = sdk;

    sdk.init({
      apiBaseUrl: 'https://api.example.com',
      appId: 'demo-app-001',
      theme: 'light',
      language: 'zh-CN',
      trackEvent: (event, data) => {
        console.log('[Track]', event, data);
      },
      onError: (error) => {
        console.error('[Error]', error);
      },
      onLoadingChange: (isLoading) => {
        console.log('[Loading]', isLoading);
      },
    });

    const mockParkingLots = [
      {
        id: 'lot001',
        name: '国贸中心停车场',
        address: '北京市朝阳区建国门外大街1号',
        type: 'underground',
        totalSpaces: 500,
        availableSpaces: 128,
        distance: 0.5,
        pricePerHour: 8,
        maxDailyPrice: 80,
        freeMinutes: 30,
        features: ['充电桩', '无障碍', '24小时'],
      },
      {
        id: 'lot002',
        name: '万达广场停车场',
        address: '北京市朝阳区建国路88号',
        type: 'indoor',
        totalSpaces: 800,
        availableSpaces: 45,
        distance: 1.2,
        pricePerHour: 6,
        freeMinutes: 15,
        features: ['充电桩', '洗车服务'],
      },
      {
        id: 'lot003',
        name: 'SOHO现代城停车场',
        address: '北京市朝阳区建国路88号',
        type: 'outdoor',
        totalSpaces: 200,
        availableSpaces: 0,
        distance: 0.8,
        pricePerHour: 5,
        features: ['露天'],
      },
    ];

    const mockOrder = {
      id: 'order001',
      orderNo: 'PK202401150001',
      parkingLotId: 'lot001',
      parkingLotName: '国贸中心停车场',
      plateNumber: '京A12345',
      entryTime: '2024-01-15T09:30:00',
      duration: 125,
      totalAmount: 20.0,
      discountAmount: 5.0,
      payableAmount: 15.0,
      status: 'pending',
    };

    const mockCoupons = [
      {
        id: 'cp001',
        name: '新用户专享优惠券',
        type: 'amount',
        value: 10,
        minAmount: 20,
        expireTime: '2024-02-28',
        status: 'available',
      },
      {
        id: 'cp002',
        name: '停车8折券',
        type: 'discount',
        value: 8,
        expireTime: '2024-01-31',
        status: 'available',
      },
      {
        id: 'cp003',
        name: '免费停车2小时',
        type: 'free_hours',
        value: 2,
        expireTime: '2024-03-15',
        status: 'available',
      },
      {
        id: 'cp004',
        name: '已使用的优惠券',
        type: 'amount',
        value: 5,
        expireTime: '2024-01-10',
        status: 'used',
      },
    ];

    const mockVehicles = [
      {
        id: 'v001',
        plateNumber: '京A12345',
        type: '小型汽车',
        isDefault: true,
        bindTime: '2023-10-01',
      },
      {
        id: 'v002',
        plateNumber: '京B67890',
        type: 'SUV',
        isDefault: false,
        bindTime: '2023-12-15',
      },
    ];

    sdk.createComponent('parking-lot-selector', {
      container: '#lot-selector',
      data: {
        parkingLots: mockParkingLots,
        selectedLotId: 'lot001',
      },
      onEvent: (event, data) => {
        console.log('[ParkingLotSelector]', event, data);
      },
    });

    sdk.createComponent('space-panel', {
      container: '#space-panel',
      data: {
        parkingLot: mockParkingLots[0],
      },
    });

    sdk.createComponent('plate-input', {
      container: '#plate-input',
      data: {
        plateNumber: '京A',
        vehicles: mockVehicles,
      },
      onEvent: (event, data) => {
        console.log('[PlateInput]', event, data);
      },
    });

    sdk.createComponent('order-card', {
      container: '#order-card',
      data: {
        order: mockOrder,
      },
      onEvent: (event, data) => {
        console.log('[OrderCard]', event, data);
      },
    });

    sdk.createComponent('coupon-list', {
      container: '#coupon-list',
      data: {
        coupons: mockCoupons,
        orderAmount: 20,
      },
      onEvent: (event, data) => {
        console.log('[CouponList]', event, data);
      },
    });

    sdk.createComponent('payment-result', {
      container: '#payment-result',
      data: {
        success: true,
        order: mockOrder,
        paidAmount: 15.0,
        paymentMethod: 'wechat',
        transactionId: 'wx202401150001',
      },
      onEvent: (event, data) => {
        console.log('[PaymentResult]', event, data);
      },
    });

    sdk.createComponent('invoice-apply', {
      container: '#invoice-apply',
      data: {
        orders: [mockOrder],
        totalAmount: 15.0,
      },
      onEvent: (event, data) => {
        console.log('[InvoiceApply]', event, data);
        if (event === 'submit') {
          sdk.showToast('发票申请已提交', 'success');
        }
      },
    });

    console.log('✅ 智慧停车SDK 已初始化完成');
    console.log('📦 可用组件:', ['parking-lot-selector', 'space-panel', 'plate-input', 'order-card', 'coupon-list', 'payment-result', 'invoice-apply']);
    console.log('⚡ 可用API:', Object.keys(sdk).filter(k => typeof sdk[k] === 'function').slice(0, 10), '...');
  </script>
</body>
</html>
